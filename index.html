<style>
  :root {
    --navy:        #0a1726;
    --navy-deep:   #06101b;
    --ink:         #e8edf2;
    --ink-soft:    #9aa9b8;
    --ink-faint:   #5d6f80;
    --teal:        #0EA5E9;
    --teal-dim:    #0284c7;
    --line:        rgba(255,255,255,0.08);
    --sans: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--navy);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* faint data grid */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 0%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 0%, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }

  /* drifting aurora */
  .aurora {
    position: fixed; inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse 90% 80% at 50% 35%, #000 0%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 35%, #000 0%, transparent 80%);
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.6;
    will-change: transform;
  }
  .blob-1 {
    width: 620px; height: 620px;
    top: -180px; left: 50%;
    background: radial-gradient(circle, rgba(14,165,233,0.32) 0%, transparent 70%);
    animation: drift1 22s ease-in-out infinite;
  }
  .blob-2 {
    width: 520px; height: 520px;
    top: -60px; left: 18%;
    background: radial-gradient(circle, rgba(2,132,199,0.30) 0%, transparent 70%);
    animation: drift2 28s ease-in-out infinite;
  }
  .blob-3 {
    width: 460px; height: 460px;
    top: 40px; right: 12%;
    background: radial-gradient(circle, rgba(70,130,220,0.22) 0%, transparent 70%);
    animation: drift3 26s ease-in-out infinite;
  }
  @keyframes drift1 {
    0%,100% { transform: translate(-50%, 0) scale(1); }
    50%     { transform: translate(-46%, 50px) scale(1.12); }
  }
  @keyframes drift2 {
    0%,100% { transform: translate(0, 0) scale(1); opacity: .55; }
    50%     { transform: translate(70px, 70px) scale(1.08); opacity: .75; }
  }
  @keyframes drift3 {
    0%,100% { transform: translate(0, 0) scale(1.05); opacity: .5; }
    50%     { transform: translate(-60px, 40px) scale(.92); opacity: .7; }
  }
  @media (prefers-reduced-motion: reduce) {
    .blob { animation: none !important; }
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 0 32px;
  }
  .screen {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* header */
  header {
    padding: 40px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wordmark {
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.18em;
  }
  .wordmark .dot { color: var(--teal); }
  .status {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--teal);
  }

  /* hero */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 0;
  }
  .brand {
    font-size: clamp(66px, 14vw, 148px);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1.0;
    margin-bottom: 18px;
    padding-bottom: 0.08em;
    color: var(--ink);
    opacity: 0;
    transform: translateY(16px);
    animation: brand-in .8s cubic-bezier(.22,.61,.36,1) .15s forwards;
  }
  @keyframes brand-in { to { opacity: 1; transform: none; } }
  h1 {
    font-size: clamp(38px, 6.5vw, 62px);
    line-height: 1.04;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
  }
  h1 .accent {
    color: var(--teal);
  }
  .lede {
    font-size: clamp(20px, 3vw, 27px);
    line-height: 1.5;
    color: var(--ink-soft);
    max-width: 560px;
    margin-bottom: 44px;
  }
  .cta-row {
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--teal);
    color: var(--navy-deep);
    font-family: var(--sans);
    font-weight: 600;
    font-size: 15px;
    padding: 14px 26px;
    border-radius: 8px;
    text-decoration: none;
    transition: background .18s ease;
  }
  .btn:hover {
    background: #38bdf8;
  }
  .note {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--ink-faint);
    letter-spacing: 0.03em;
  }

  /* contact */
  #contact {
    padding: 96px 0 88px;
    border-top: 1px solid var(--line);
  }
  .contact-h2 {
    font-size: clamp(26px, 4vw, 36px);
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 40px;
  }
  form { display: flex; flex-direction: column; gap: 22px; }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
  }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field label {
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .field input,
  .field select,
  .field textarea {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    transition: border-color .15s ease, background .15s ease;
  }
  .field textarea { resize: vertical; min-height: 96px; }
  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    outline: none;
    border-color: var(--teal-dim);
    background: rgba(14,165,233,0.05);
  }
  .field select { appearance: none; cursor: pointer; }
  .field select option { background: var(--navy); color: var(--ink); }
  .btn-submit {
    border: none;
    cursor: pointer;
    align-self: flex-start;
    margin-top: 4px;
  }
  #form-status {
    font-family: var(--mono);
    font-size: 13px;
    display: none;
  }

  /* footer */
  footer {
    border-top: 1px solid var(--line);
    padding: 32px 0 56px;
  }
  .footer-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-copy {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--ink-faint);
  }
  .social {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px; height: 38px;
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink-soft);
    transition: color .15s ease, border-color .15s ease, transform .15s ease;
  }
  .social:hover {
    color: var(--teal);
    border-color: var(--teal-dim);
    transform: translateY(-2px);
  }

  /* staggered load animation */
  .reveal {
    opacity: 0;
    transform: translateY(14px);
    animation: rise .7s cubic-bezier(.22,.61,.36,1) forwards;
  }
  @keyframes rise {
    to { opacity: 1; transform: none; }
  }
  .d1 { animation-delay: .05s; }
  .d2 { animation-delay: .15s; }
  .d3 { animation-delay: .25s; }
  .d4 { animation-delay: .35s; }
  .d5 { animation-delay: .45s; }
  .d6 { animation-delay: .55s; }

  /* logo tiles build in on load */
  .logomark rect {
    opacity: 0;
    transform-box: fill-box;
    transform-origin: center;
    transform: scale(.55);
    animation: tile-in .55s cubic-bezier(.22,1,.36,1) forwards;
  }
  .logomark rect:nth-of-type(1) { animation-delay: .10s; }
  .logomark rect:nth-of-type(2) { animation-delay: .16s; }
  .logomark rect:nth-of-type(3) { animation-delay: .22s; }
  .logomark rect:nth-of-type(4) { animation-delay: .28s; }
  .logomark rect:nth-of-type(5) { animation-delay: .34s; }
  .logomark rect:nth-of-type(6) { animation-delay: .40s; }
  .logomark rect:nth-of-type(7) { animation-delay: .46s; }
  .logomark rect:nth-of-type(8) { animation-delay: .52s; }
  @keyframes tile-in { to { opacity: 1; transform: scale(1); } }

  /* scroll-triggered reveals for lower sections */
  .scroll-reveal {
    opacity: 0;
    transform: translateY(22px);
    transition: opacity .8s cubic-bezier(.22,1,.36,1), transform .8s cubic-bezier(.22,1,.36,1);
    will-change: opacity, transform;
  }
  .scroll-reveal.in-view { opacity: 1; transform: none; }
  .scroll-reveal.delay-1 { transition-delay: .12s; }

  @media (prefers-reduced-motion: reduce) {
    .reveal, .logomark rect, .scroll-reveal { animation: none !important; transition: none !important; opacity: 1 !important; transform: none !important; }
    .brand { animation: none !important; opacity: 1 !important; transform: none !important; }
  }

  @media (max-width: 560px) {
    header { padding: 28px 0; flex-direction: column; gap: 16px; align-items: flex-start; }
    .form-row { grid-template-columns: 1fr; }
    #contact { padding: 72px 0 64px; }
    .wrap { padding: 0 24px; }
  }
</style>
</head>

  <div class="aurora">
    <div class="blob blob-1"></div>

  <div class="wrap">

    <div class="screen">

      <div class="wordmark reveal d1">
        <svg class="logomark" width="78" height="78" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Labviq">

          <rect x="32" y="32" width="16" height="16" rx="3" fill="none" stroke="#0EA5E9" stroke-width="1.5"/>

    <section class="hero">
      <div class="brand">Labviq</div>
      <h1 class="reveal d3">A <span class="accent">system of record</span> for your life science lab</h1>
      <p class="lede reveal d4">
        Life cycle tracking of research materials
      </p>
      <div class="cta-row reveal d5">
        <a class="btn" href="#contact">
          Stay updated
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
      </div>
    </section>
    </div>

    <section id="contact">
      <h2 class="contact-h2 scroll-reveal">Get updates as we launch.</h2>
      <form id="contact-form" class="scroll-reveal delay-1" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="7d3a52ca-f7e3-474d-a13b-144ad9bf1049">
        <input type="hidden" name="subject" value="New message — Labviq">
        <input type="hidden" name="redirect" value="false">
        <div class="form-row">
          <div class="field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="field">
            <label for="email">Work email</label>
            <input type="email" id="email" name="email" required>
          </div>
        </div>
        <div class="field">
          <label for="industry">Industry</label>
          <select id="industry" name="industry" required>
            <option value="" disabled selected></option>
            <option value="academia">Academia</option>
            <option value="biotech">Biotech</option>
            <option value="pharmaceuticals">Pharmaceuticals</option>
            <option value="venture-capital">Venture capital</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="field" id="industry-other-field" hidden>
          <label for="industry_other">Please specify</label>
          <input type="text" id="industry_other" name="industry_other">
        </div>
        <div class="field">
          <label for="message">Message (optional)</label>
          <textarea id="message" name="message" rows="4"></textarea>
        </div>
        <button type="submit" class="btn btn-submit" id="submit-btn">Send message</button>
        <p id="form-status"></p>
      </form>
    </section>

    <footer>
      <div class="footer-inner scroll-reveal">
        <span class="footer-copy">&copy; 2026 Labviq</span>
        <a class="social" href="https://www.linkedin.com/company/labviq" target="_blank" rel="noopener" aria-label="Labviq on LinkedIn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.13 2.06 2.06 0 0 1 0 4.13zM7.12 20.45H3.55V9h3.57v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.73V1.73C24 .77 23.2 0 22.22 0z"/>
          </svg>
        </a>
      </div>
    </footer>

  </div>

  <script>
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Scroll-triggered reveals for lower sections
    if (!reduceMotion) {
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('in-view'); io.unobserve(e.target); }
        });
      }, { threshold: 0.18 });
      document.querySelectorAll('.scroll-reveal').forEach(el => io.observe(el));
    } else {
      document.querySelectorAll('.scroll-reveal').forEach(el => el.classList.add('in-view'));
    }

    // Aurora drifts gently toward the cursor (eased), adding depth
    if (!reduceMotion && window.matchMedia('(pointer: fine)').matches) {
      const aurora = document.querySelector('.aurora');
      let mx = 0, my = 0, cx = 0, cy = 0;
      window.addEventListener('mousemove', (e) => {
        mx = (e.clientX / window.innerWidth  - 0.5);
        my = (e.clientY / window.innerHeight - 0.5);
      }, { passive: true });
      const loop = () => {
        cx += (mx * 34 - cx) * 0.045;
        cy += (my * 34 - cy) * 0.045;
        aurora.style.transform = `translate(${cx.toFixed(2)}px, ${cy.toFixed(2)}px)`;
        requestAnimationFrame(loop);
      };
      loop();
    }

    // Reveal the "specify" field only when Industry = Other
    const industrySelect = document.getElementById('industry');
    const otherField = document.getElementById('industry-other-field');
    const otherInput = document.getElementById('industry_other');
    industrySelect.addEventListener('change', () => {
      const isOther = industrySelect.value === 'other';
      otherField.hidden = !isOther;
      otherInput.required = isOther;
      if (!isOther) otherInput.value = '';
    });

    // Web3Forms async submission
    const contactForm = document.getElementById('contact-form');
    const submitBtn   = document.getElementById('submit-btn');
    const formStatus  = document.getElementById('form-status');
    contactForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';
      formStatus.style.display = 'none';
      try {
        const res = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: new FormData(contactForm)
        });
        const data = await res.json();
        if (data.success) {
          formStatus.textContent = 'Message sent — we\'ll be in touch.';
          formStatus.style.color = 'var(--ink-soft)';
          contactForm.reset();
          otherField.hidden = true;
        } else {
          throw new Error(data.message || 'Submission failed');
        }
      } catch (err) {
        formStatus.textContent = 'Something went wrong. Please email hello@labviq.com directly.';
        formStatus.style.color = 'rgba(255,120,120,0.85)';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send message';
        formStatus.style.display = 'block';
      }
    });
  </script>

</body>
</html>
